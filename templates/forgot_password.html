{% extends "layout.html" %}
{% block title %}Passwort vergessen{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="page-shell p-4 p-lg-5">
        <p class="section-label mb-2">Passwort-Reset</p>
        <h1 class="h3 mb-3">Link zum Zurücksetzen anfordern</h1>
        <p class="text-secondary mb-4">Wenn die Adresse im System vorhanden ist und SMTP eingerichtet wurde, erhalten Sie einen sicheren Link per E-Mail.</p>
        <form method="post" class="vstack gap-3" novalidate>
          <div>
            <label class="form-label">E-Mail-Adresse</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <button class="btn btn-primary">Reset-Link senden</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
