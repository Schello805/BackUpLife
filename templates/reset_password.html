{% extends "layout.html" %}
{% block title %}Neues Passwort{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="page-shell p-4 p-lg-5">
        <p class="section-label mb-2">Passwort-Reset</p>
        <h1 class="h3 mb-3">Ein neues Passwort für {{ token_row['display_name'] }} festlegen</h1>
        <form method="post" class="vstack gap-3" novalidate>
          <div>
            <label class="form-label">Neues Passwort</label>
            <input type="password" name="password" class="form-control" minlength="10" required>
          </div>
          <div>
            <label class="form-label">Passwort wiederholen</label>
            <input type="password" name="password_confirm" class="form-control" minlength="10" required>
          </div>
          <button class="btn btn-primary">Passwort speichern</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
